<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="hospital.png">
    <title>Maqueta Gestión de Traslados - Hospital de Clínicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
:root {
    --primary-blue: #0056b3; 
    --light-bg: #f8f9fa;     
    --white: #ffffff;
}

body {
    background-color: var(--light-bg);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.card {
    border: none;
    border-radius: 0.5rem;
    box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
}

.card-header {
    background-color: var(--primary-blue) !important;
    color: var(--white);
    font-weight: 600;
}

.btn-primary {
    background-color: var(--primary-blue);
    border-color: var(--primary-blue);
}

.btn-primary:hover {
    background-color: #004494;
}

.table thead.table-primary {
    background-color: var(--primary-blue);
    color: var(--white);
}

.form-control, .form-select {
    border-radius: 0.375rem;
    border: 1px solid #ced4da;
}

.form-control:focus {
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 0.2rem rgba(0, 86, 179, 0.25);
}

@media (max-width: 576px) {
    .container, .container-fluid {
        padding-left: 1rem;
        padding-right: 1rem;
    }
    
    .btn {
        width: 100%;
        margin-bottom: 0.5rem;
    }
}
</style>
</head>
<body>
    <div class="container-fluid py-4">
    <h2 class="text-primary mb-4">Panel de Gestión de Traslados</h2>
    
    <div class="row mb-4">
        <div class="col-12">
            <button class="btn btn-outline-primary">En Curso</button>
            <button class="btn btn-outline-secondary">Finalizados</button>
            <button class="btn btn-outline-info">Pendientes</button>
        </div>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover align-middle">
            <thead class="table-primary">
                <tr>
                    <th>Matricula</th>
                    <th>Elemento/Paciente</th>
                    <th>Chofer</th>
                    <th>Enfermero</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>SAM 2192</td>
                    <td>Paciente (C.I. 1.234.567-8)</td>
                    <td>Juan Pérez</td>
                    <td>Ana García</td>
                    <td><span class="badge bg-success">En Camino</span></td>
                    <td><button class="btn btn-sm btn-primary">Ver Seguimiento</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
